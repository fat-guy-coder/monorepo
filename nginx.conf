server {
    listen 80;
    listen 443 ssl;
    listen 443 quic;
    http2 on;
    
listen [::]:80;
    
    server_name denglie.asia;
    index index.html;
    root /www/wwwroot/learning;
    include /www/server/panel/vhost/nginx/extension/denglie.asia/*.conf;

    #CERT-APPLY-CHECK--START
    # 用于SSL证书申请时的文件验证相关配置 -- 请勿删除
    include /www/server/panel/vhost/nginx/well-known/denglie.asia.conf;
    #CERT-APPLY-CHECK--END

    #SSL-START SSL相关配置，请勿删除或修改下一行带注释的404规则
    #error_page 404/404.html;
    ssl_certificate    /www/server/panel/vhost/cert/denglie.asia/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/denglie.asia/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    add_header Alt-Svc 'quic=":443"; h3=":443"; h3-29=":443"; h3-27=":443";h3-25=":443"; h3-T050=":443"; h3-Q050=":443";h3-Q049=":443";h3-Q048=":443"; h3-Q046=":443"; h3-Q043=":443"';
    error_page 497  https://$host$request_uri;

    #SSL-END
    #REDIRECT START
    
    #REDIRECT END

    #ERROR-PAGE-START  错误页配置，可以注释、删除或修改
    #error_page 404 /404.html;
    #error_page 502 /502.html;
    #ERROR-PAGE-END

    #PHP-INFO-START  PHP引用配置，可以注释或修改
    
    include enable-php-00.conf;
    #PHP-INFO-END

    #IP-RESTRICT-START 限制访问ip的配置，IP黑白名单
    
    
    #IP-RESTRICT-END

    #BASICAUTH START
    
    #BASICAUTH END
    
        # ---------- Gzip 配置 (确保已有) ----------
    gzip on;
    gzip_vary on;               # 重要: 告知缓存服务器根据 Accept-Encoding 缓存不同版本
    gzip_static on;             # 重要: 优先使用预压缩的 .gz 文件 (如果你有)
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        image/svg+xml;

    # ---------- Brotli 配置 (新增) ----------
    brotli on;
    brotli_static on;           # 重要: 优先使用预压缩的 .br 文件 (如果你有)
    brotli_comp_level 6;         # 压缩级别 (1-11), 6 是平衡点
    brotli_min_length 20;        # 小于 20 字节的文件不压缩
    brotli_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        image/svg+xml;

    #SUB_FILTER START
    
    #SUB_FILTER END

    #GZIP START
    
    #GZIP END

    #GLOBAL-CACHE START
    
    #GLOBAL-CACHE END

    #WEBSOCKET-SUPPORT START
    proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    #WEBSOCKET-SUPPORT END

    #PROXY-CONF-START
     location / {
    root /www/wwwroot/learning;
    index index.html;
    try_files $uri $uri/ /index.html;
    }

    # Admin 管理后台 -> 静态文件
    location /admin {
    alias /www/wwwroot/admin;
    index index.html;
    try_files $uri $uri/ /admin/index.html;
    }

    # Backend API -> 3000
    location /api {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    #PROXY-CONF-END

    #SERVER-BLOCK START
    
    #SERVER-BLOCK END

    #禁止访问的文件或目录
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md)
    {
        return 404;
    }

    #一键申请SSL证书验证目录相关设置
    location /.well-known{
        allow all;
    }

    #禁止在证书验证目录放入敏感文件
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    #LOG START
    access_log  /www/wwwlogs/denglie.asia.log;
    error_log  /www/wwwlogs/denglie.asia.error.log;
    
    #LOG END
}