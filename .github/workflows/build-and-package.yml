name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  DEPLOY_PATH: /www/wwwroot

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build projects
        run: pnpm turbo run build

      # ========== 上传 admin ==========
      - name: Upload admin
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command: |
            mkdir -p ${{ env.DEPLOY_PATH }}/admin
          source: "apps/admin/dist/"
          target: "${{ env.DEPLOY_PATH }}/admin/"

      # ========== 上传 learning ==========
      - name: Upload learning
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command: |
            mkdir -p ${{ env.DEPLOY_PATH }}/learning
          source: "apps/learning/dist/"
          target: "${{ env.DEPLOY_PATH }}/learning/"

      # ========== 上传 backend ==========
      - name: Upload backend
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command: |
            mkdir -p ${{ env.DEPLOY_PATH }}/backend
          source: "apps/backend/"
          target: "${{ env.DEPLOY_PATH }}/backend/"
          exclude: "node_modules/**"

      # ========== 上传 nginx 配置并重启服务 ==========
      - name: Deploy nginx and restart backend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            # 上传 nginx 配置
            cp nginx.conf /www/server/nginx/nginx.conf

            # 重载 nginx
            nginx -t && nginx -s reload

            # 重启 backend Docker
            cd ${{ env.DEPLOY_PATH }}/backend
            if [ $(docker ps -aq -f name=backend-app) ]; then
              docker stop backend-app && docker rm backend-app
            fi
            docker build -t backend-app .
            docker run -d \
              --name backend-app \
              -p 3000:3000 \
              --restart always \
              backend-app
