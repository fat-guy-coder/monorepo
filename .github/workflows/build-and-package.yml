name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  DEPLOY_PATH: /www/wwwroot

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build projects
        run: pnpm turbo run build

      # ========== 上传所有文件并重启服务 ==========
      - name: Deploy all
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            # 上传 admin (rsync 源路径带 / 表示只传目录内容)
            rsync -av --delete apps/admin/dist/ $DEPLOY_PATH/admin/

            # 上传 learning
            rsync -av --delete apps/learning/dist/ $DEPLOY_PATH/learning/

            # 上传 backend (排除 node_modules)
            rsync -av --delete --exclude='node_modules' apps/backend/ $DEPLOY_PATH/backend/

            # 上传 nginx 配置
            cp nginx.conf /www/server/nginx/nginx.conf

            # 重载 nginx
            nginx -t && nginx -s reload

            # 重启 backend Docker
            cd $DEPLOY_PATH/backend
            if [ $(docker ps -aq -f name=backend-app) ]; then
              docker stop backend-app && docker rm backend-app
            fi
            docker build -t backend-app .
            docker run -d \
              --name backend-app \
              -p 3000:3000 \
              --restart always \
              backend-app
