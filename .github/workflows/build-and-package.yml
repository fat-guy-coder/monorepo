name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  DEPLOY_PATH: /www/wwwroot

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build admin
        run: pnpm --filter admin build

      - name: Build learning
        run: pnpm --filter learning build

      - name: Build backend
        run: pnpm --filter backend build

      # ========== 打包待上传文件 ==========
      - name: Prepare deploy packages
        run: |
          mkdir -p dist
          # 仅打包 dist 内部文件，避免解压后出现 admin/dist、learning/dist 嵌套
          tar -cf dist/admin.tar -C apps/admin/dist .
          tar -cf dist/learning.tar -C apps/learning/dist .
          # 后端打包为应用根内容，排除 node_modules
          tar --exclude=node_modules -cf dist/backend.tar -C apps/backend .

      # ========== 上传并解压 admin ==========
      - name: Deploy admin
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/admin.tar"
          target: "${{ env.DEPLOY_PATH }}"
          strip_components: 1
          overwrite: true

      - name: Extract admin
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            rm -rf admin && mkdir admin
            tar -xf admin.tar -C admin
            rm admin.tar

      # ========== 上传并解压 learning ==========
      - name: Deploy learning
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/learning.tar"
          target: "${{ env.DEPLOY_PATH }}"
          strip_components: 1
          overwrite: true

      - name: Extract learning
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            rm -rf learning && mkdir learning
            tar -xf learning.tar -C learning
            rm learning.tar

      # ========== 上传并解压 backend ==========
      - name: Deploy backend
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/backend.tar"
          target: "${{ env.DEPLOY_PATH }}"
          strip_components: 1
          overwrite: true

      - name: Extract and restart backend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            rm -rf backend && mkdir backend
            tar -xf backend.tar -C backend
            rm backend.tar

            cd backend
            if [ $(docker ps -aq -f name=backend-app) ]; then
              docker stop backend-app && docker rm backend-app
            fi
            docker build -t backend-app .
            docker run -d \
              --name backend-app \
              -p 3000:3000 \
              --restart always \
              backend-app
