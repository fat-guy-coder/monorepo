name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  DEPLOY_PATH: /www/wwwroot

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      admin: ${{ steps.changes.outputs.admin }}
      learning: ${{ steps.changes.outputs.learning }}
      backend: ${{ steps.changes.outputs.backend }}
      any: ${{ steps.changes.outputs.any }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed apps
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            admin:
              - 'apps/admin/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            learning:
              - 'apps/learning/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            backend:
              - 'apps/backend/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            any:
              - 'apps/admin/**'
              - 'apps/learning/**'
              - 'apps/backend/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'

  deploy-admin:
    needs: detect-changes
    if: needs.detect-changes.outputs.admin == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build admin
        run: pnpm --filter admin build

      - name: Package admin
        run: |
          mkdir -p dist
          tar -cf dist/admin.tar -C apps/admin/dist .

      - name: Upload admin package
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/admin.tar"
          target: "${{ env.DEPLOY_PATH }}"
          strip_components: 1
          overwrite: true

      - name: Extract admin
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            rm -rf admin && mkdir admin
            tar -xf admin.tar -C admin
            rm admin.tar

  deploy-learning:
    needs: detect-changes
    if: needs.detect-changes.outputs.learning == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build learning
        run: pnpm --filter learning build

      - name: Package learning
        run: |
          mkdir -p dist
          tar -cf dist/learning.tar -C apps/learning/dist .

      - name: Upload learning package
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/learning.tar"
          target: "${{ env.DEPLOY_PATH }}"
          strip_components: 1
          overwrite: true

      - name: Extract learning
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            rm -rf learning && mkdir learning
            tar -xf learning.tar -C learning
            rm learning.tar

  deploy-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package backend
        run: |
          mkdir -p dist
          tar --exclude=node_modules -cf dist/backend.tar -C apps/backend .

      - name: Upload backend package
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/backend.tar"
          target: "${{ env.DEPLOY_PATH }}"
          strip_components: 1
          overwrite: true

      - name: Extract and restart backend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            rm -rf backend && mkdir backend
            tar -xf backend.tar -C backend
            rm backend.tar

            cd backend
            if [ $(docker ps -aq -f name=backend-app) ]; then
              docker stop backend-app && docker rm backend-app
            fi

            if [ -z "${{ secrets.DATABASE_URL }}" ]; then
              echo "ERROR: GitHub Secret DATABASE_URL is empty"
              exit 1
            fi

            docker build -t backend-app .
            docker run -d \
              --name backend-app \
              -p 3000:3000 \
              -e DATABASE_URL='${{ secrets.DATABASE_URL }}' \
              --restart always \
              backend-app
