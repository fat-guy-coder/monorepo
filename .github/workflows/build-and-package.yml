name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  DEPLOY_PATH: /www/wwwroot

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build projects
        run: pnpm turbo run build

      # ========== 上传 admin ==========
      - name: Upload admin
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "apps/admin/dist/*"
          target: "${{ env.DEPLOY_PATH }}/admin"

      # ========== 上传 learning ==========
      - name: Upload learning
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "apps/learning/dist/*"
          target: "${{ env.DEPLOY_PATH }}/learning"

      # ========== 上传 backend ==========
      - name: Upload backend
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "apps/backend/*"
          target: "${{ env.DEPLOY_PATH }}/backend"
          exclude: "node_modules/**"

      # ========== 上传 nginx 配置 ==========
      - name: Upload nginx config
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "nginx.conf"
          target: "/www/server/panel/vhost/nginx/denglie.asia.conf"

      # ========== 重启 backend Docker ==========
      - name: Restart backend Docker
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            nginx -t && nginx -s reload

            cd ${{ env.DEPLOY_PATH }}/backend

            # 如果容器已存在，先停止并删除
            if [ $(docker ps -aq -f name=backend-app) ]; then
              docker stop backend-app && docker rm backend-app
            fi

            # 构建并启动新的 Docker 容器
            docker build -t backend-app .
            docker run -d \
              --name backend-app \
              -p 3000:3000 \
              --restart always \
              backend-app
