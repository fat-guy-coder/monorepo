openapi: 3.0.3
info:
  title: Menu API
  description: 菜单管理 API 文档
  version: 1.0.0
components:
  schemas: {}
paths:
  /api/menus:
    get:
      parameters:
        - schema:
            type: string
          in: query
          name: project
          required: false
        - schema:
            type: string
          in: query
          name: parentId
          required: false
        - schema:
            type: string
            enum:
              - 'true'
              - 'false'
          in: query
          name: flat
          required: false
      responses:
        '200':
          description: Default Response
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - label
              properties:
                name:
                  type: string
                label:
                  type: string
                path:
                  type: string
                icon:
                  type: string
                order:
                  type: integer
                project:
                  type: string
                parentId:
                  type: string
      responses:
        '200':
          description: Default Response
  /api/menus/{id}:
    get:
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        '200':
          description: Default Response
    put:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                label:
                  type: string
                path:
                  type: string
                icon:
                  type: string
                order:
                  type: integer
                project:
                  type: string
                parentId:
                  type: string
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        '200':
          description: Default Response
    delete:
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        '200':
          description: Default Response
  /api/menus/{id}/children:
    get:
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        '200':
          description: Default Response
servers:
  - url: http://localhost:3000
